version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-akhdan-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

