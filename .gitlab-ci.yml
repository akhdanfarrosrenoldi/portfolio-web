stages:
  - lint
  - build
  - deploy-staging
  - deploy-production

lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" == "develop" ]; then
        export TAG="staging"
      elif [ "$CI_COMMIT_BRANCH" == "main" ]; then
        export TAG="latest"
      else
        export TAG="$CI_COMMIT_REF_SLUG"
      fi
    - docker build -t $DOCKER_USERNAME/portfolio-web:$TAG .
    - docker push $DOCKER_USERNAME/portfolio-web:$TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"

deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $STAGING_USER@$STAGING_HOST "docker pull $DOCKER_USERNAME/portfolio-web:staging && (docker stop portfolio-web || true) && (docker rm portfolio-web || true) && docker run -d --name portfolio-web -p 3000:3000 --restart unless-stopped $DOCKER_USERNAME/portfolio-web:staging"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy-production:
  stage: deploy-production
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PRODUCTION_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PRODUCTION_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $PRODUCTION_USER@$PRODUCTION_HOST "docker pull $DOCKER_USERNAME/portfolio-web:latest && (docker stop portfolio-web || true) && (docker rm portfolio-web || true) && docker run -d --name portfolio-web -p 3000:3000 --restart unless-stopped $DOCKER_USERNAME/portfolio-web:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
